<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiteShop Admin</title>
  <script src="./config.js"></script>
  <style>
    :root {
      --bg: #08130e;
      --panel: #102019;
      --panel-2: #132922;
      --line: #1e6f46;
      --text: #f5fff8;
      --muted: #9cd3b4;
      --accent: #5af2a2;
      --accent-2: #20b96a;
      --danger: #ff7e7e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body {
      background: radial-gradient(circle at top, #143121 0%, var(--bg) 55%);
      color: var(--text);
      padding: 20px;
    }
    .app { max-width: 1220px; margin: 0 auto; }
    .topbar { display: flex; justify-content: space-between; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .brand { font-size: 34px; font-weight: 800; }
    .subtitle { color: var(--muted); margin-top: 6px; font-size: 14px; }
    .api-box {
      background: rgba(16, 32, 25, 0.92);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      min-width: 320px;
    }
    .grid { display: grid; grid-template-columns: 420px 1fr; gap: 18px; }
    .panel {
      background: rgba(16, 32, 25, 0.94);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.2);
    }
    .panel h2 { font-size: 22px; margin-bottom: 14px; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
    .stat {
      background: rgba(19, 41, 34, 0.96);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }
    .stat-value { font-size: 26px; font-weight: 800; color: var(--accent); margin-top: 8px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 700; }
    .field input, .field textarea, .field select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #0c1813;
      color: var(--text);
      padding: 13px 14px;
      font-size: 14px;
      outline: none;
    }
    .field textarea { min-height: 110px; resize: vertical; }
    .inline { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .checkbox {
      display: flex; align-items: center; gap: 10px;
      border: 1px solid var(--line); border-radius: 14px; padding: 12px 14px; background: #0c1813;
    }
    .checkbox input { width: auto; }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
    .btn {
      border: none;
      border-radius: 14px;
      padding: 13px 16px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      color: #082212;
      flex: 1;
      min-width: 150px;
    }
    .btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--line); }
    .preview-box {
      border: 1px dashed rgba(90, 242, 162, 0.4);
      border-radius: 18px;
      padding: 12px;
      background: rgba(11, 24, 19, 0.92);
      margin-bottom: 14px;
    }
    .preview-box img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 14px;
      background: #183627;
      display: block;
    }
    .toolbar { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .toolbar input, .toolbar select {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #0c1813;
      color: var(--text);
      padding: 12px 14px;
      font-size: 14px;
    }
    .toolbar input { flex: 1; min-width: 220px; }
    .products { display: grid; gap: 14px; }
    .product-card {
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(18, 38, 31, 0.98), rgba(11, 20, 17, 0.98));
    }
    .product-card img {
      width: 100%;
      height: 190px;
      object-fit: cover;
      background: #173425;
      display: block;
    }
    .product-body { padding: 16px; }
    .meta { color: var(--muted); font-size: 13px; margin-bottom: 6px; }
    .title { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
    .description { color: #d8f8e4; font-size: 13px; line-height: 1.45; margin-bottom: 12px; }
    .price { color: var(--accent); font-size: 22px; font-weight: 800; margin-bottom: 12px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .action-btn {
      flex: 1;
      min-width: 130px;
      border-radius: 12px;
      padding: 11px 14px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-weight: 700;
    }
    .danger { border-color: rgba(255, 126, 126, 0.4); color: var(--danger); }
    .status { margin-top: 12px; color: var(--accent); font-size: 14px; min-height: 20px; }
    .empty { color: var(--muted); padding: 18px 0; }
    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      body { padding: 14px; }
      .stats { grid-template-columns: 1fr; }
      .inline { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div>
        <div class="brand">LiteShop Admin</div>
        <div class="subtitle">Управление товарами, категориями, ценами и превью</div>
      </div>
      <div class="api-box">
        <div style="font-size:13px;color:var(--muted);margin-bottom:8px;">Адрес backend API</div>
        <input id="apiBase" type="text" value="" style="width:100%;border:1px solid var(--line);border-radius:12px;background:#0c1813;color:#fff;padding:12px 14px;" />
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div>Всего товаров</div><div class="stat-value" id="statProducts">0</div></div>
      <div class="stat"><div>Категорий</div><div class="stat-value" id="statCategories">0</div></div>
      <div class="stat"><div>Средняя цена</div><div class="stat-value" id="statAverage">0 ₽</div></div>
      <div class="stat"><div>Заказов</div><div class="stat-value" id="statOrders">0</div></div>
    </div>

    <div class="grid">
      <section class="panel">
        <h2 id="formTitle">Добавить товар</h2>

        <div class="field">
          <label for="title">Название товара</label>
          <input id="title" type="text" placeholder="Например: Тестовая покупка" />
        </div>

        <div class="field">
          <label for="description">Описание</label>
          <textarea id="description" placeholder="Коротко объясни, что получает покупатель"></textarea>
        </div>

        <div class="inline">
          <div class="field">
            <label for="price">Цена в рублях</label>
            <input id="price" type="number" step="0.01" min="0.01" placeholder="1" />
          </div>

          <div class="field">
            <label for="sortOrder">Порядок сортировки</label>
            <input id="sortOrder" type="number" min="0" step="1" placeholder="100" />
          </div>
        </div>

        <div class="field">
          <label for="category">Категория</label>
          <input id="category" list="categoryOptions" type="text" placeholder="Например: Тест или Brawl Stars" />
          <datalist id="categoryOptions"></datalist>
        </div>

        <div class="field">
          <label for="image">Ссылка на основное превью</label>
          <input id="image" type="text" placeholder="https://site.com/image.jpg" oninput="updatePreview()" />
        </div>

        <div class="field">
          <label for="banner">Ссылка на баннер</label>
          <input id="banner" type="text" placeholder="Можно оставить пустым" oninput="updatePreview()" />
        </div>

        <div class="preview-box">
          <img id="previewImage" src="https://placehold.co/600x320/173425/ffffff?text=Preview" alt="preview" />
        </div>

        <div class="field">
          <label class="checkbox">
            <input id="inStock" type="checkbox" checked />
            <span>Товар доступен для покупки</span>
          </label>
        </div>

        <div class="btn-row">
          <button class="btn" onclick="saveProduct()">Сохранить</button>
          <button class="btn btn-secondary" onclick="resetForm()">Очистить форму</button>
        </div>

        <div class="status" id="statusText"></div>
      </section>

      <section class="panel">
        <h2>Каталог товаров</h2>

        <div class="toolbar">
          <input id="searchInput" type="text" placeholder="Поиск по названию или категории" oninput="renderProducts()" />
          <select id="filterStock" onchange="renderProducts()">
            <option value="all">Все товары</option>
            <option value="active">Только доступные</option>
            <option value="hidden">Только скрытые</option>
          </select>
          <button class="btn btn-secondary" style="flex:0 0 auto;" onclick="loadAll()">Обновить</button>
        </div>

        <div id="productsList" class="products"></div>
      </section>
    </div>
  </div>

  <script>
    const PLACEHOLDER = "https://placehold.co/600x320/173425/ffffff?text=Preview";
    let products = [];
    let summary = null;
    let editingId = null;

    function apiBase() {
      return document.getElementById("apiBase").value.trim().replace(/\/$/, "");
    }

    function setStatus(text, isError = false) {
      const el = document.getElementById("statusText");
      el.textContent = text;
      el.style.color = isError ? "var(--danger)" : "var(--accent)";
    }

    function formatPrice(value) {
      return Number(value).toLocaleString("ru-RU", { minimumFractionDigits: 0, maximumFractionDigits: 2 }) + " ₽";
    }

    function updatePreview() {
      const image = document.getElementById("image").value.trim();
      const banner = document.getElementById("banner").value.trim();
      document.getElementById("previewImage").src = image || banner || PLACEHOLDER;
    }

    function resetForm() {
      editingId = null;
      document.getElementById("formTitle").textContent = "Добавить товар";
      document.getElementById("title").value = "";
      document.getElementById("description").value = "";
      document.getElementById("price").value = "";
      document.getElementById("sortOrder").value = "100";
      document.getElementById("category").value = "";
      document.getElementById("image").value = "";
      document.getElementById("banner").value = "";
      document.getElementById("inStock").checked = true;
      document.getElementById("previewImage").src = PLACEHOLDER;
      setStatus("");
    }

    function fillCategoryOptions() {
      const categories = [...new Set(products.map(item => item.category || "Без категории"))];
      document.getElementById("categoryOptions").innerHTML = categories.map(value => `<option value="${value}"></option>`).join("");
    }

    function renderStats() {
      if (!summary) return;
      document.getElementById("statProducts").textContent = summary.products_total || 0;
      document.getElementById("statCategories").textContent = summary.categories_total || 0;
      document.getElementById("statAverage").textContent = formatPrice(summary.average_price_rub || 0);
      document.getElementById("statOrders").textContent = summary.orders_total || 0;
    }

    function getFilteredProducts() {
      const query = document.getElementById("searchInput").value.trim().toLowerCase();
      const stockFilter = document.getElementById("filterStock").value;

      return products.filter(item => {
        const matchesQuery = !query || item.title.toLowerCase().includes(query) || (item.category || "").toLowerCase().includes(query);
        const matchesStock = stockFilter === "all"
          || (stockFilter === "active" && item.in_stock)
          || (stockFilter === "hidden" && !item.in_stock);
        return matchesQuery && matchesStock;
      });
    }

    function renderProducts() {
      const items = getFilteredProducts();
      const container = document.getElementById("productsList");

      if (!items.length) {
        container.innerHTML = `<div class="empty">По текущему фильтру товары не найдены.</div>`;
        return;
      }

      container.innerHTML = items.map(item => `
        <article class="product-card">
          <img src="${item.image || item.banner || PLACEHOLDER}" alt="${item.title}" onerror="this.src='${PLACEHOLDER}'" />
          <div class="product-body">
            <div class="meta">${item.category || "Без категории"} • ${item.in_stock ? "Доступен" : "Скрыт"} • sort ${item.sort_order ?? 100}</div>
            <div class="title">${item.title}</div>
            <div class="description">${item.description || "Описание пока не заполнено."}</div>
            <div class="price">${formatPrice(item.price_rub)}</div>
            <div class="actions">
              <button class="action-btn" onclick="editProduct('${item.id}')">Редактировать</button>
              <button class="action-btn" onclick="toggleStock('${item.id}')">${item.in_stock ? "Скрыть" : "Показать"}</button>
              <button class="action-btn danger" onclick="deleteProduct('${item.id}')">Удалить</button>
            </div>
          </div>
        </article>
      `).join("");
    }

    async function request(path, options = {}) {
      const response = await fetch(apiBase() + path, {
        headers: { "Content-Type": "application/json", ...(options.headers || {}) },
        ...options
      });

      const data = await response.json().catch(() => ({}));
      if (!response.ok || data.ok === false) {
        throw new Error(data.detail || data.error || "Ошибка запроса");
      }
      return data;
    }

    async function loadAll() {
      try {
        const [productsData, summaryData] = await Promise.all([
          request("/products?include_hidden=true"),
          request("/admin/summary")
        ]);

        products = productsData.items || [];
        summary = summaryData;
        fillCategoryOptions();
        renderStats();
        renderProducts();
        setStatus("Данные обновлены");
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    function collectPayload() {
      return {
        title: document.getElementById("title").value.trim(),
        description: document.getElementById("description").value.trim(),
        price_rub: Number(document.getElementById("price").value),
        sort_order: Number(document.getElementById("sortOrder").value || 100),
        category: document.getElementById("category").value.trim() || "Без категории",
        image: document.getElementById("image").value.trim(),
        banner: document.getElementById("banner").value.trim(),
        in_stock: document.getElementById("inStock").checked
      };
    }

    async function saveProduct() {
      const payload = collectPayload();

      if (!payload.title) {
        setStatus("Укажи название товара", true);
        return;
      }
      if (!payload.price_rub || payload.price_rub <= 0) {
        setStatus("Укажи корректную цену", true);
        return;
      }

      try {
        if (editingId) {
          await request("/products/" + editingId, { method: "PUT", body: JSON.stringify(payload) });
          setStatus("Товар обновлён");
        } else {
          await request("/products", { method: "POST", body: JSON.stringify(payload) });
          setStatus("Товар добавлен");
        }

        await loadAll();
        resetForm();
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    function editProduct(id) {
      const item = products.find(product => product.id === id);
      if (!item) return;

      editingId = id;
      document.getElementById("formTitle").textContent = "Редактировать товар";
      document.getElementById("title").value = item.title || "";
      document.getElementById("description").value = item.description || "";
      document.getElementById("price").value = item.price_rub ?? "";
      document.getElementById("sortOrder").value = item.sort_order ?? 100;
      document.getElementById("category").value = item.category || "";
      document.getElementById("image").value = item.image || "";
      document.getElementById("banner").value = item.banner || "";
      document.getElementById("inStock").checked = Boolean(item.in_stock);
      updatePreview();
      setStatus("Режим редактирования включён");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function toggleStock(id) {
      const item = products.find(product => product.id === id);
      if (!item) return;

      try {
        await request("/products/" + id, {
          method: "PUT",
          body: JSON.stringify({ ...item, in_stock: !item.in_stock })
        });
        setStatus(item.in_stock ? "Товар скрыт" : "Товар снова доступен");
        await loadAll();
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    async function deleteProduct(id) {
      const item = products.find(product => product.id === id);
      if (!item) return;
      if (!confirm(`Удалить товар "${item.title}"?`)) return;

      try {
        await request("/products/" + id, { method: "DELETE" });
        if (editingId === id) {
          resetForm();
        }
        setStatus("Товар удалён");
        await loadAll();
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    document.getElementById("apiBase").value = window.LITESHOP_CONFIG?.API_BASE_URL || "";
    resetForm();
    loadAll();
  </script>
</body>
</html>
